name: HR System Full Deploy

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-full.yml'
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1

jobs:
  deploy-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend build
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Backend JAR
        working-directory: ./backend
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      # Frontend build
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          NODE_ENV: production

      # Deploy
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Copy files to remote server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mkdir -p ${{ secrets.WORKING_DIR }}/{backend,frontend}"

          # Backend files
          scp -o StrictHostKeyChecking=no backend/target/*.jar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.WORKING_DIR }}/backend/app.jar
          scp -o StrictHostKeyChecking=no backend/Dockerfile ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.WORKING_DIR }}/backend/

          # Frontend files
          scp -o StrictHostKeyChecking=no frontend/Dockerfile ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.WORKING_DIR }}/frontend/
          scp -o StrictHostKeyChecking=no frontend/package*.json ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.WORKING_DIR }}/frontend/
          scp -r -o StrictHostKeyChecking=no frontend/{public,.next,app,components,lib,*.ts,*.mjs} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.WORKING_DIR }}/frontend/ || true

          # Docker compose
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.WORKING_DIR }}/

      - name: Deploy on Remote Server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd ${{ secrets.WORKING_DIR }}
            docker compose down
            docker compose up -d --build
          EOF

      - name: Health Check
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            echo "Waiting for services to start..."
            sleep 30

            # Check backend
            curl -f http://localhost:8080/actuator/health || exit 1
            echo "✓ Backend is healthy!"

            # Check frontend
            curl -f http://localhost:3000 || exit 1
            echo "✓ Frontend is healthy!"

            echo "✓ All services are running!"
          EOF
