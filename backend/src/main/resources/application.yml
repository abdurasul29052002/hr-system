spring:
  application:
    name: hr-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: 9090

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-hours: 72
  bot:
    token: ${HR_BOT_TOKEN:}
    username: ${HR_BOT_USERNAME:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  s3:
    enabled: ${S3_ENABLED}
    region: ${S3_REGION}
    bucket-name: ${S3_BUCKET_NAME}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    endpoint: ${S3_ENDPOINT}