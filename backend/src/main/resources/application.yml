spring:
  config:
    import: optional:file:./backend/.env[.properties]
  application:
    name: hr-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      # Above max-file-size so several attachments can ride along in one comment.
      max-request-size: 220MB
      # Spill to disk almost immediately instead of buffering uploads in the heap: the container is capped
      # at 1g with MaxRAMPercentage=60, so a couple of concurrent 100MB uploads would otherwise OOM it.
      file-size-threshold: 128KB

server:
  port: 9090
  tomcat:
    # When a request is rejected before its body is read (over max-file-size, bad auth), Tomcat drains the
    # rest so it can still send a proper response. The 2MB default meant anything larger got a connection
    # reset instead — the browser showed a generic network error rather than the 413. Uncapped now that a
    # single upload can be 100MB.
    max-swallow-size: -1

logging:
  level:
    org.springframework.aop.framework.CglibAopProxy: error

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-hours: 72
  admin:
    username: ${APP_ADMIN_USERNAME}
    password: ${APP_ADMIN_PASSWORD}
  bot:
    token: ${HR_BOT_TOKEN:}
    username: ${HR_BOT_USERNAME:}
    # Telegram chat id that receives support-ticket alerts (new ticket / user reply). Optional — the
    # single project owner has no Telegram link of their own, so set this to their chat id to be pinged.
    admin-chat-id: ${HR_BOT_ADMIN_CHAT_ID:}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  s3:
    enabled: ${S3_ENABLED}
    region: ${S3_REGION}
    bucket-name: ${S3_BUCKET_NAME}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}
    endpoint: ${S3_ENDPOINT}