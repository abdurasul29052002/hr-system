databaseChangeLog:
  # Adds the designated reviewer/tester on a task (GitHub-PR style). Nullable FK to employees.
  - changeSet:
      id: v1.1-add-task-reviewer-column
      author: claude
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: tasks
            columns:
              - column:
                  name: reviewer_id
                  type: BIGINT
  - changeSet:
      id: v1.1-add-task-reviewer-fk
      author: claude
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addForeignKeyConstraint:
            baseColumnNames: reviewer_id
            baseTableName: tasks
            constraintName: FK_TASKS_ON_REVIEWER
            referencedColumnNames: id
            referencedTableName: employees
