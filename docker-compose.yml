services:
  hr_system_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr-system-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL:-jdbc:h2:file:/app/data/hrdb}
      - DB_USERNAME=${DB_USERNAME:-sa}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - APP_JWT_SECRET=${APP_JWT_SECRET:-change-this-secret-in-production}
      - APP_ADMIN_USERNAME=${APP_ADMIN_USERNAME:-admin}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD:-admin123}
      - HR_BOT_TOKEN=${HR_BOT_TOKEN:-}
      - HR_BOT_USERNAME=${HR_BOT_USERNAME:-}
    volumes:
      - hr-data:/app/data
    networks:
      - hr-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  hr-data:
    driver: local

networks:
  hr-network:
    driver: bridge
