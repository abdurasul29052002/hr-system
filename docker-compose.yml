services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - hr-postgres-data:/var/lib/postgresql/data
    networks:
      - hr-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  hr_system_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hr-system-backend:latest
    container_name: hr-system-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
    env_file:
      - ./.env
    ports:
      - "9090:9090"
    mem_limit: 1g
    volumes:
      - hr-data:/app/data
    networks:
      - hr-network
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  hr-postgres-data:
    driver: local
  hr-data:
    driver: local

networks:
  hr-network:
    driver: bridge
