services:
  postgres:
    image: postgres:16-alpine
    container_name: hr-system-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hrdb}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - hr-postgres-data:/var/lib/postgresql/data
    networks:
      - hr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  hr_system_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hr-system-backend:latest
    container_name: hr-system-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Force the PostgreSQL profile and point the datasource at the postgres service.
      # Everything else (credentials, JWT, S3, bot, CORS) comes from ./.env
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-hrdb}
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    mem_limit: 1g
    volumes:
      - hr-data:/app/data
    networks:
      - hr-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

volumes:
  hr-postgres-data:
    driver: local
  hr-data:
    driver: local

networks:
  hr-network:
    driver: bridge
